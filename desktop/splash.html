<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buxton SignFlow</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --ink: #071430;
        --muted: #66708b;
        --line: #dbe2ee;
        --orange: #ff6500;
        --red: #ef0037;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 80% 16%, rgba(255, 101, 0, 0.16), transparent 11rem),
          linear-gradient(135deg, #ffffff 0%, #f6f8fc 100%);
        color: var(--ink);
      }

      .card {
        width: min(360px, calc(100vw - 40px));
        padding: 34px;
        display: grid;
        gap: 18px;
        text-align: center;
        background: rgba(255, 255, 255, 0.88);
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 28px 80px rgba(7, 20, 48, 0.14);
      }

      img {
        width: 118px;
        height: 118px;
        object-fit: contain;
        margin: 0 auto 4px;
      }

      h1 {
        margin: 0;
        font-size: 30px;
        letter-spacing: -0.02em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-weight: 700;
        line-height: 1.45;
      }

      .bar {
        height: 8px;
        overflow: hidden;
        border-radius: 999px;
        background: #edf1f7;
      }

      .bar span {
        display: block;
        width: 45%;
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--orange), var(--red));
        animation: load 1.15s ease-in-out infinite;
      }

      @keyframes load {
        0% {
          transform: translateX(-110%);
        }
        100% {
          transform: translateX(230%);
        }
      }
    </style>
  </head>
  <body>
    <main class="card" aria-live="polite">
      <img src="./assets/signflow-logo.png" alt="Buxton SignFlow" />
      <h1>Buxton SignFlow</h1>
      <p>Opening your contract workspace.</p>
      <div class="bar" aria-hidden="true"><span></span></div>
    </main>
  </body>
</html>
