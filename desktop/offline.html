<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buxton SignFlow Offline</title>
    <style>
      :root {
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --ink: #071430;
        --muted: #66708b;
        --line: #dbe2ee;
        --red: #ef0037;
        --blue: #0c64b8;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 28px;
        color: var(--ink);
        background:
          radial-gradient(circle at 86% 10%, rgba(239, 0, 55, 0.1), transparent 22rem),
          linear-gradient(135deg, #ffffff, #f6f8fc);
      }

      .card {
        width: min(680px, 100%);
        padding: clamp(28px, 5vw, 46px);
        background: #fff;
        border: 1px solid var(--line);
        border-radius: 28px;
        box-shadow: 0 30px 90px rgba(7, 20, 48, 0.12);
      }

      img {
        width: 92px;
        height: 92px;
        object-fit: contain;
      }

      h1 {
        margin: 22px 0 10px;
        font-size: clamp(34px, 5vw, 54px);
        line-height: 0.95;
        letter-spacing: -0.03em;
      }

      p {
        margin: 0;
        color: var(--muted);
        font-size: 18px;
        line-height: 1.55;
        font-weight: 700;
      }

      .actions {
        display: flex;
        gap: 12px;
        flex-wrap: wrap;
        margin-top: 28px;
      }

      button {
        min-height: 48px;
        padding: 0 22px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
        color: var(--ink);
        font: inherit;
        font-weight: 900;
        cursor: pointer;
      }

      .primary {
        border-color: transparent;
        color: #fff;
        background: linear-gradient(135deg, var(--red), #d90032);
        box-shadow: 0 18px 38px rgba(239, 0, 55, 0.18);
      }
    </style>
  </head>
  <body>
    <main class="card">
      <img src="./assets/signflow-logo.png" alt="Buxton SignFlow" />
      <h1>Can't reach SignFlow.</h1>
      <p>
        Check your internet connection, then try again. Drafts and contract records stay on the secure server,
        so you can continue once the app reconnects.
      </p>
      <div class="actions">
        <button class="primary" onclick="location.reload()">Retry</button>
        <button onclick="window.signFlowDesktop?.copyDiagnostics()">Copy Diagnostic Info</button>
      </div>
    </main>
  </body>
</html>
