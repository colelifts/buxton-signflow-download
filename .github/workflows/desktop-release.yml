name: Desktop Release Builds

on:
  workflow_dispatch:
  push:
    tags:
      - "v*.*.*"

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: buxton-signflow-windows
          path: |
            dist-desktop/*.exe
            dist-desktop/latest.yml

  macos:
    name: macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/upload-artifact@v4
        with:
          name: buxton-signflow-macos
          path: |
            dist-desktop/*.dmg
            dist-desktop/latest-mac.yml
