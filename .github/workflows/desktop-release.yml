name: Desktop Release Builds

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish installers to"
        required: true
        default: "v1.0.0"
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ inputs.tag || github.ref_name }}

jobs:
  windows:
    name: Windows installer
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish Windows installer to release
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload $env:RELEASE_TAG `
            "dist-desktop/Buxton-SignFlow-Setup-1.0.0.exe" `
            "dist-desktop/Buxton-SignFlow-Setup-1.0.0.exe.blockmap" `
            "dist-desktop/latest.yml" `
            --clobber

  macos:
    name: macOS app
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run dist:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish macOS installer to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "dist-desktop/Buxton.SignFlow-1.0.0.dmg" \
            "dist-desktop/latest-mac.yml" \
            --clobber
